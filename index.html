<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Love Firework</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#ff9a9e,#ff4b5c);
    overflow:hidden;
    font-family:Arial, sans-serif;
    position:relative;
}

/* ปุ่มล่าง */
button{
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:50px;
    background:#ff1744;
    color:white;
    cursor:pointer;
    z-index:100;
    transition:.3s;
}
button:hover{
    transform:translateX(-50%) scale(1.1);
}

.popup{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation:fadeIn .6s ease-in-out;
}

/* หัวใจ */
.heart{
    font-size:170px;
    animation:heartbeat 1s infinite;
}

/* รูป */
.love-image{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    margin-top:-110px;
    margin-bottom:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:floatImage 3s ease-in-out infinite alternate;
}

/* ข้อความ */
.text{
    font-size:34px;
    color:white;
    text-shadow:2px 2px 10px rgba(0,0,0,0.5);
}

/* พลุ */
.spark{
    position:absolute;
    width:8px;
    height:8px;
    border-radius:50%;
    background:yellow;
    animation:explode 1s linear forwards;
}

/* animations */
@keyframes heartbeat{
    0%{transform:scale(1);}
    25%{transform:scale(1.2);}
    50%{transform:scale(1);}
    75%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

@keyframes floatImage{
    from{transform:translateY(0);}
    to{transform:translateY(-15px);}
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(.5);}
    to{opacity:1; transform:scale(1);}
}

@keyframes explode{
    from{
        transform:translate(0,0);
        opacity:1;
    }
    to{
        transform:translate(var(--x), var(--y));
        opacity:0;
    }
}
</style>
</head>

<body>

<button onclick="showLove()">กดเพื่อเซอร์ไพรส์ ❤️</button>

<script>
function showLove(){
    const popup=document.createElement("div");
    popup.classList.add("popup");

    popup.innerHTML=`
        <div class="heart">❤️</div>
        <img src="love.png" class="love-image">
        <div class="text">love patchareeporn</div>
    `;

    document.body.appendChild(popup);

    createFirework(popup);

    setTimeout(()=>{
        popup.remove();
    },6000);
}

function createFirework(parent){
    for(let i=0;i<40;i++){
        const spark=document.createElement("div");
        spark.classList.add("spark");

        const angle=Math.random()*2*Math.PI;
        const distance=150+Math.random()*100;

        const x=Math.cos(angle)*distance+"px";
        const y=Math.sin(angle)*distance+"px";

        spark.style.setProperty('--x',x);
        spark.style.setProperty('--y',y);

        spark.style.background=`hsl(${Math.random()*360},100%,50%)`;

        parent.appendChild(spark);

        setTimeout(()=>spark.remove(),1000);
    }
}
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 30 + 15 + "px";
    heart.style.animationDuration = Math.random() * 3 + 3 + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

// สร้างหัวใจเยอะ ๆ
setInterval(createHeart, 100);
</script>

</body>
</html>
